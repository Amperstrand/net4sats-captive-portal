name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx vite build
        env:
          VITE_MOCK: true
          VITE_BASE_PATH: /net4sats-captive-portal/
      - name: Copy gallery assets
        run: |
          mkdir -p build/gallery/screenshots build/gallery/videos
          cp tests/gallery.html build/gallery/index.html
          cp tests/screenshots/*.png build/gallery/screenshots/
          cp tests/videos/*.webm build/gallery/videos/ 2>/dev/null || true
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
